name: Trigger auto deployment for commands

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/commands-AutoDeployTrigger-243b90ac-a1fd-48c7-a811-ad7de68e98ca.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.COMMANDS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.COMMANDS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.COMMANDS_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: collectorcr.azurecr.io
          registryUsername: ${{ secrets.COMMANDS_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.COMMANDS_REGISTRY_PASSWORD }}
          containerAppName: commands
          resourceGroup: collector
          imageToBuild: collectorcr.azurecr.io/commands:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


