name: CI Collector

# Déclenche la pipeline sur chaque push ou pull request sur la branche dev
on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Checkout
        uses: actions/checkout@v4

      - name: 2 - SDK .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 3 - Restore des packages
        run: dotnet restore

      - name: 4 - Build
        run: dotnet build --no-restore --configuration Release

      - name: 5 - Tests
        run: dotnet test CollectorCommands.Tests/CollectorCommands.Tests.csproj --no-build --configuration Release --verbosity normal