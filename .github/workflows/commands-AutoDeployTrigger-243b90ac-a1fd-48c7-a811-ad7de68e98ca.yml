name: Trigger auto deployment for commands

on:
  push:
    branches: 
      [ master ]
    tags:
      - 'v*'
    paths:
    - '**'
    - '.github/workflows/commands-AutoDeployTrigger-243b90ac-a1fd-48c7-a811-ad7de68e98ca.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  security-scan:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - uses: actions/checkout@v5

      - name: 1 - Install Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
          apt-get update && apt-get install -y nodejs

      - name: 2 - Install Snyk CLI
        run: npm install -g snyk

      - name: 3 - Authentification Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      - name: 4 - Restore
        run: dotnet restore

      - name: 5 - Scan Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --fail-on=all \
            --sarif-output=$GITHUB_WORKSPACE

  sonarqube:
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17 # Nécessaire pour sonarqube
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'
          
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
          
      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v5
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
          
      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
          
      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner
          
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"MaximeBro_Collector" /o:"maximebro" /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          dotnet build
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
  
  build:
    needs: [security-scan, sonarqube]
    runs-on: ubuntu-latest
    steps:
      - name: 1 - Checkout
        uses: actions/checkout@v5

      - name: 2 - SDK .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 3 - Restore des packages
        run: dotnet restore

      - name: 4 - Build
        run: dotnet build --no-restore --configuration Release

      - name: 5 - Upload Build Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-binaries
          path: |
            **/bin/Release/
            **/obj/Release/
          retention-days: 1

  code-coverage:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - name: 1 - SDK .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 2 - Restore
        run: dotnet restore

      - name: 3 - Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: 4 - Collect coverage
        run: |
          dotnet test CollectorCommands.Tests/CollectorCommands.Tests.csproj \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage-results

      - name: 5 - Generate results
        run: |
          reportgenerator \
            -reports:"coverage-results/**/coverage.cobertura.xml" \
            -targetdir:coverage-report \
            -reporttypes:TextSummary \
            -assemblyfilters:"+CollectorCommands"

      - name: 6 - Checking result
        run: |
          COVERAGE=$(grep "Line coverage" coverage-report/Summary.txt | grep -oP '\d+\.\d+' | head -1)
          echo "Couverture : $COVERAGE%"

          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Couverture insuffisante : $COVERAGE% < 80% requis"
            exit 1
          fi
          echo "✅ Couverture OK : $COVERAGE%"

      - name: 7 - GitHub Actions summary
        if: always()
        run: |
          COVERAGE=$(grep "Line coverage" coverage-report/Summary.txt | grep -oP '\d+\.\d+' | head -1)
          echo "## 📊 Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "| Métrique | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Couverture | **${COVERAGE}%** |" >> $GITHUB_STEP_SUMMARY
          echo "| Seuil | **80%** |" >> $GITHUB_STEP_SUMMARY
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "| Statut | ❌ Insuffisant |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Statut | ✅ OK |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 8 - Upload HTML report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: coverage-report/

  unit-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Checkout
        uses: actions/checkout@v5

      - name: 2 - SDK .NET 10
        uses: actions/setup-dotnet@v5
        with: 
          dotnet-version: '10.0.x'

      - name: 3 - Récupération du build
        uses: actions/download-artifact@v5
        with:
          name: build-binaries

      - name: 4 - Tests unitaires
        run: dotnet test CollectorCommands.Tests/CollectorCommands.Tests.csproj --no-build --configuration Release --verbosity normal

  integration-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Checkout
        uses: actions/checkout@v5

      - name: 2 - SDK .NET 10
        uses: actions/setup-dotnet@v5
        with: 
          dotnet-version: '10.0.x'

      - name: 3 - Récupération du build
        uses: actions/download-artifact@v5
        with:
          name: build-binaries

      - name: 4 - Tests d'intégration
        run: dotnet test CollectorCommands.IntegrationTests/CollectorCommands.IntegrationTests.csproj --no-build --configuration Release --verbosity normal

  deploy:
    needs: [build, code-coverage, unit-test, integration-test]
    # if: startsWith(github.event.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.COMMANDS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.COMMANDS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.COMMANDS_AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          echo ${{ secrets.COMMANDS_REGISTRY_PASSWORD }} | docker login collectorcr.azurecr.io -u ${{ secrets.COMMANDS_REGISTRY_USERNAME }} --password-stdin

      - name: Build and Push Image
        run: |
          docker build -t collectorcr.azurecr.io/commands:${{ github.sha }} -f ./CollectorCommands/Dockerfile .
          docker push collectorcr.azurecr.io/commands:${{ github.sha }}

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: collectorcr.azurecr.io/commands:${{ github.sha }}
          containerAppName: commands
          resourceGroup: collector
